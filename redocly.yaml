# See https://redocly.com/docs/cli/configuration/ for more information.
apis:
  sample@v1:
    root: openapi/openapi.yml
    theme:
      openapi:
        htmlTemplate: ./docs/index.html
        # Added the 'theme' key back here because 'colors' must be inside it
        theme:
          colors:
            primary:
              main: "#32329f"
        generateCodeSamples:
          languages:
            - lang: curl
            - lang: Node.js
            - lang: JavaScript
            - lang: PHP
            - lang: Python

# The rest of your file remains the same
extends:
  - recommended

rules:
  no-unused-components: error
  no-server-example.com: off